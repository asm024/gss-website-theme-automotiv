<div class="col-6 col-md-4 mb-2" itemtype="http://schema.org/Article" role="article" aria-label="[@content_name@]">
	<div class="card">
		<span itemprop="publisher" itemscope itemtype="https://schema.org/Organization">
			<meta itemprop="url" content="[@config:home_url@]" />
			<meta itemprop="name" content="[@config:company_name@]" />
			<span itemprop="logo" itemscope itemtype="https://schema.org/ImageObject">
				<meta itemprop="url" content="[@config:home_url@][@config:imageurl@]/website_logo.png"></span>
		</span>
		<img class="card-img-top" src="[%asset_url type:'content' id:'[@content_id@]' thumb:'full'%][%param default%][%cdn_asset html:'0' library:'images'%]default_product.gif[%/cdn_asset%][%/param%][%/ asset_url%]" alt="[@content_name@] image">
		<div class="card-body">
			<h4 class="card-title"itemprop="headline" content="[@content_name@]"><a href="[@url@]" itemprop="url">[@content_name@]</a></h4>
			<p class="text-muted">
				[%IF [@content_author@]%]
				<span itemprop="author" itemscope itemtype="https://schema.org/Person">
					Author: <span itemprop="name">[@content_author@]</span>
				</span><br>
				[%/ IF%]
				[%IF [@date_posted@] != 0000-00-00 00:00:00%]
				<meta itemprop="datePublished" content="[%format type:'date' format:'#Y-#M-#d'%][@date_posted@][%/format%]" />
				Date Posted: [%FORMAT type:'date'%][@date_posted@][%/ FORMAT%]
				[%/ IF%]
			</p>
			<p class="clearfix" itemprop="description">[@content_short_description2@]</p>
			<a href="[@url@]">Read More</a>
		</div>
	</div>
</div>
