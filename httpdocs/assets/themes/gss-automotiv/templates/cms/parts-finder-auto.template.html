<style>
    .gss-pf-panel {
        background: #000;
        border: 2px solid #fcf005;
        border-radius: 4px;
    }
    .gss-pf-heading {
        color: #fcf005;
        font-size: 1.4rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .gss-pf-label {
        color: #fff;
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 0.35rem;
        display: block;
    }
    .gss-pf-select {
        background: #fff;
        color: #000;
        border: 2px solid #ccc;
        border-radius: 3px;
        height: 42px;
        font-size: 0.95rem;
        width: 100%;
    }
    .gss-pf-select:focus {
        border-color: #fcf005;
        box-shadow: 0 0 0 2px rgba(252,240,5,0.35);
        outline: none;
    }
    .gss-pf-select:disabled { opacity: 0.45; cursor: not-allowed; }
    .gss-pf-btn-find {
        background: #fcf005;
        color: #000;
        font-weight: 700;
        border: 2px solid #000;
        padding: 0.6rem 2rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: background 0.15s, color 0.15s;
        cursor: pointer;
        border-radius: 3px;
    }
    .gss-pf-btn-find:hover:not(:disabled) {
        background: #000;
        color: #fcf005;
        border-color: #fcf005;
    }
    .gss-pf-btn-find:disabled { opacity: 0.4; cursor: not-allowed; }
    .gss-pf-saved-banner {
        background: #1a1a1a;
        border: 1px solid #fcf005;
        border-radius: 4px;
        color: #fff;
        font-size: 0.95rem;
    }
    .gss-pf-btn-clear {
        background: transparent;
        color: #fcf005;
        border: 1px solid #fcf005;
        font-size: 0.8rem;
        cursor: pointer;
        padding: 0.25rem 0.75rem;
        border-radius: 3px;
    }
    .gss-pf-btn-clear:hover { background: #fcf005; color: #000; }
    .gss-pf-loading { color: #fcf005; font-size: 0.9rem; }
</style>

<div class="col-12">

    <div id="gss-part-finder" x-data="gssPartFinder()" x-init="init()" class="gss-pf-widget mb-4">

        <!-- Saved vehicle banner -->
        <div x-show="hasSavedVehicle" class="gss-pf-saved-banner mb-3 p-3 d-flex align-items-center justify-content-between flex-wrap">
            <span><strong>Your vehicle:</strong> <span x-text="savedLabel"></span></span>
            <button type="button" class="gss-pf-btn-clear mt-2 mt-sm-0" @click="clearVehicle()">Change vehicle</button>
        </div>

        <div class="gss-pf-panel p-4">
            <h2 class="gss-pf-heading mb-4">Find Parts For Your Vehicle</h2>

            <div x-show="loading" class="gss-pf-loading mb-3">
                <i class="fa fa-spinner fa-spin"></i> Loading&hellip;
            </div>
            <div x-show="error" class="alert alert-danger mb-3" x-text="error"></div>

            <div class="row">
                <div class="col-12 col-sm-6 col-md-4 mb-3">
                    <label class="gss-pf-label" for="pf-make">Make</label>
                    <select id="pf-make" class="gss-pf-select" x-model="make" @change="onMakeChange()" :disabled="loading">
                        <option value="">Select Make</option>
                        <template x-for="m in makes" :key="m">
                            <option :value="m" x-text="m"></option>
                        </template>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-md-4 mb-3">
                    <label class="gss-pf-label" for="pf-model">Model</label>
                    <select id="pf-model" class="gss-pf-select" x-model="model" @change="onModelChange()" :disabled="loading || !make">
                        <option value="">Select Model</option>
                        <template x-for="m in models" :key="m">
                            <option :value="m" x-text="m"></option>
                        </template>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-md-4 mb-3">
                    <label class="gss-pf-label" for="pf-year">Year</label>
                    <select id="pf-year" class="gss-pf-select" x-model="year" @change="onYearChange()" :disabled="loading || !model">
                        <option value="">Select Year</option>
                        <template x-for="y in years" :key="y">
                            <option :value="y" x-text="y"></option>
                        </template>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-md-6 mb-3">
                    <label class="gss-pf-label" for="pf-series">Series / Engine</label>
                    <select id="pf-series" class="gss-pf-select" x-model="serie" @change="onSerieChange()" :disabled="loading || !year">
                        <option value="">Select Series / Engine</option>
                        <template x-for="s in series" :key="s">
                            <option :value="s" x-text="s"></option>
                        </template>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-md-6 mb-3">
                    <label class="gss-pf-label" for="pf-body">Body / Driveline</label>
                    <select id="pf-body" class="gss-pf-select" x-model="body" :disabled="loading || !serie">
                        <option value="">Select Body / Driveline</option>
                        <template x-for="b in bodies" :key="b">
                            <option :value="b" x-text="b"></option>
                        </template>
                    </select>
                </div>
            </div>

            <div class="mt-3">
                <button type="button" class="gss-pf-btn-find btn-lg" @click="findParts()" :disabled="!canSearch">
                    <i class="fa fa-search mr-2"></i>Find Parts
                </button>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js" defer></script>
<script>
var GSS_API_BASE = 'https://gss-part-finder.azurewebsites.net';
var GSS_VEHICLE_KEY = 'gss_vehicle';
var _dropdownCache = {};

function gssFetch(url) {
    if (_dropdownCache[url]) return Promise.resolve(_dropdownCache[url]);
    return fetch(url)
        .then(function(res) {
            if (!res.ok) throw new Error('API error ' + res.status);
            return res.json();
        })
        .then(function(data) {
            _dropdownCache[url] = data.results || [];
            return _dropdownCache[url];
        });
}

function gssApiUrl(endpoint, params) {
    var qs = Object.keys(params)
        .filter(function(k) { return params[k]; })
        .map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); })
        .join('&');
    return GSS_API_BASE + '/api/' + endpoint + (qs ? '?' + qs : '');
}

function gssLoadVehicle() {
    try { return JSON.parse(localStorage.getItem(GSS_VEHICLE_KEY) || 'null'); } catch(e) { return null; }
}
function gssSaveVehicle(v) {
    try { localStorage.setItem(GSS_VEHICLE_KEY, JSON.stringify(v)); } catch(e) {}
}
function gssClearVehicle() {
    try { localStorage.removeItem(GSS_VEHICLE_KEY); } catch(e) {}
}

function gssPartFinder() {
    return {
        makes: [], models: [], years: [], series: [], bodies: [],
        make: '', model: '', year: '', serie: '', body: '',
        loading: false, error: '', hasSavedVehicle: false, savedLabel: '',

        init: function() {
            var self = this;
            gssFetch(gssApiUrl('makes', {})).then(function(data) {
                self.makes = data;
                var saved = gssLoadVehicle();
                if (saved && saved.make) {
                    self.hasSavedVehicle = true;
                    self.savedLabel = saved.make + ' ' + saved.model + ' ' + saved.year;
                    self.restoreVehicle(saved);
                }
            }).catch(function() {
                self.error = 'Could not load vehicle makes. Please refresh the page.';
            });
        },

        restoreVehicle: function(saved) {
            var self = this;
            self.make = saved.make || '';
            if (!self.make) return;
            gssFetch(gssApiUrl('models', { make: self.make })).then(function(data) {
                self.models = data; self.model = saved.model || '';
                if (!self.model) return Promise.reject('stop');
                return gssFetch(gssApiUrl('years', { make: self.make, model: self.model }));
            }).then(function(data) {
                self.years = data; self.year = saved.year || '';
                if (!self.year) return Promise.reject('stop');
                return gssFetch(gssApiUrl('series', { make: self.make, model: self.model, year: self.year }));
            }).then(function(data) {
                self.series = data; self.serie = saved.series || '';
                if (!self.serie) return Promise.reject('stop');
                return gssFetch(gssApiUrl('bodies', { make: self.make, model: self.model, year: self.year, series: self.serie }));
            }).then(function(data) {
                self.bodies = data; self.body = saved.body || '';
            }).catch(function() {});
        },

        onMakeChange: function() {
            var self = this;
            self.model = ''; self.models = []; self.year = ''; self.years = [];
            self.serie = ''; self.series = []; self.body = ''; self.bodies = [];
            self.error = '';
            if (!self.make) return;
            self.loading = true;
            gssFetch(gssApiUrl('models', { make: self.make }))
                .then(function(data) {
                    self.models = data;
                    if (data.length) gssFetch(gssApiUrl('years', { make: self.make, model: data[0] }));
                })
                .catch(function() { self.error = 'Could not load models. Please try again.'; })
                .then(function() { self.loading = false; });
        },

        onModelChange: function() {
            var self = this;
            self.year = ''; self.years = []; self.serie = ''; self.series = [];
            self.body = ''; self.bodies = []; self.error = '';
            if (!self.model) return;
            self.loading = true;
            gssFetch(gssApiUrl('years', { make: self.make, model: self.model }))
                .then(function(data) {
                    self.years = data;
                    if (data.length) gssFetch(gssApiUrl('series', { make: self.make, model: self.model, year: data[0] }));
                })
                .catch(function() { self.error = 'Could not load years. Please try again.'; })
                .then(function() { self.loading = false; });
        },

        onYearChange: function() {
            var self = this;
            self.serie = ''; self.series = []; self.body = ''; self.bodies = []; self.error = '';
            if (!self.year) return;
            self.loading = true;
            gssFetch(gssApiUrl('series', { make: self.make, model: self.model, year: self.year }))
                .then(function(data) {
                    self.series = data;
                    if (data.length) gssFetch(gssApiUrl('bodies', { make: self.make, model: self.model, year: self.year, series: data[0] }));
                })
                .catch(function() { self.error = 'Could not load series/engine. Please try again.'; })
                .then(function() { self.loading = false; });
        },

        onSerieChange: function() {
            var self = this;
            self.body = ''; self.bodies = []; self.error = '';
            if (!self.serie) return;
            self.loading = true;
            gssFetch(gssApiUrl('bodies', { make: self.make, model: self.model, year: self.year, series: self.serie }))
                .then(function(data) { self.bodies = data; })
                .catch(function() { self.error = 'Could not load body/driveline. Please try again.'; })
                .then(function() { self.loading = false; });
        },

        findParts: function() {
            var self = this;
            if (!self.canSearch) return;
            self.error = ''; self.loading = true;
            gssFetch(gssApiUrl('skus', { make: self.make, model: self.model, year: self.year, series: self.serie, body: self.body }))
                .then(function(skus) {
                    gssSaveVehicle({ make: self.make, model: self.model, year: self.year, series: self.serie, body: self.body });
                    self.hasSavedVehicle = true;
                    self.savedLabel = self.make + ' ' + self.model + ' ' + self.year;
                    self.loading = false;
                    if (!skus.length) {
                        self.error = 'No parts found for this vehicle combination.';
                        return;
                    }
                    window.location.href = '/?rf=kw&kw=' + encodeURIComponent(skus.join(' '));
                })
                .catch(function() {
                    self.error = 'Could not find parts. Please try again.';
                    self.loading = false;
                });
        },

        clearVehicle: function() {
            gssClearVehicle();
            this.hasSavedVehicle = false; this.savedLabel = '';
            this.make = ''; this.model = ''; this.year = ''; this.serie = ''; this.body = '';
            this.models = []; this.years = []; this.series = []; this.bodies = [];
            this.error = '';
        },

        get canSearch() {
            return this.make && this.model && this.year && this.serie && this.body && !this.loading;
        }
    };
}
</script>
