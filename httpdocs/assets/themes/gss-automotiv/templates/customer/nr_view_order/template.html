<div class="col-12">
	[%FORM id:'id' if:'ne' value:''%]Sorry, the order you are looking for cannot be found. If you require further assistance please contact customer service.[%/FORM%]
	<h1>Retrieve Order Details</h1>
	<form method="post" action="[%URL page:'account' type:'nr_view_order'%][%/URL%]">
		<div class="form-group">
			<label for="email">My E-mail Address</label>
			<input type="text" class="form-control" id="email" name="email" value="[%nohtml%][@formemail@][%/nohtml%]">
		</div>
		<div class="form-group">
			<label for="id">Order ID</label>
			<input type="text" class="form-control" id="id" name="id" value="">
		</div>
		<div class="form-group">
			<label for="zip">Ship To Post Code</label>
			<input type="password" class="form-control" id="zip" name="zip" value="">
		</div>
		<button type="submit" name="submit" class="btn btn-primary">View</button>
	</form>
</div>
