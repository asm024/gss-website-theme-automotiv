<div class="col-12">
	<nav aria-label="breadcrumb" itemscope itemtype="http://schema.org/BreadcrumbList">
		<ol class="breadcrumb">
		<li class="breadcrumb-item"><a href="[@config:home_url@]">Home</a></li>
		<li class="breadcrumb-item"><a href="[%URL page:'account'/%]">My Account</a></li>
		<li class="breadcrumb-item"><a href="#">Resolution Centre</a></li>
		</ol>
	</nav>
	<h1>Resolution Centre - Warranty, Payment &amp; Return Disputes</h1>
	[%if [@warning@]%]<div class="alert alert-warning" role="alert"><button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>[@warning@]</div>[%/if%]
	<p>Dispute #[@dispute_id@] has been updated.</p>
	<input type="button" class="btn btn-outline-secondary" value="Done" onClick="window.location.replace('[%URL page:account type:warranty id:[@dispute_id@]%][%/URL%]');">
	<script>
		setTimeout("window.location.replace('[%URL page:account type:warranty id:[@dispute_id@]%][%/URL%]')", 1000);
	</script>
</div>
