name: Build and Deploy to SFTP Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build assets and upload via SFTP
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Node.js
      # Pinned to Node 14 for compatibility with node-sass 4.x.
      # When node-sass is upgraded to 7+ (Dart Sass), this can move to Node 18+.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      # Step 3: Install dependencies
      - name: Install dependencies
        working-directory: httpdocs/assets/themes/gss-automotiv
        run: npm install --no-package-lock

      # Step 4: Compile SCSS and bundle vendor JS
      - name: Build assets
        working-directory: httpdocs/assets/themes/gss-automotiv
        run: npm run build

      # Step 5: Verify app.css was actually compiled (fail if too small)
      - name: Verify build output
        run: |
          SIZE=$(wc -c < httpdocs/assets/themes/gss-automotiv/css/app.css)
          echo "app.css size: ${SIZE} bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: app.css is too small (${SIZE} bytes) — SCSS compilation likely failed"
            exit 1
          fi

      # Step 6: Remove node_modules so it is not uploaded to the server
      - name: Clean up node_modules
        run: rm -rf httpdocs/assets/themes/gss-automotiv/node_modules

      # Step 6: Avoid server maintenance window (XX:55-XX:05) which rejects connections
      - name: Wait out server maintenance window if needed
        run: |
          minute=$(date +%-M)
          if [ "$minute" -ge 55 ] || [ "$minute" -le 5 ]; then
            if [ "$minute" -ge 55 ]; then
              wait_min=$(( 66 - minute ))
            else
              wait_min=$(( 6 - minute ))
            fi
            echo "Server maintenance window detected (current minute: $minute). Waiting ${wait_min} minute(s)..."
            sleep $(( wait_min * 60 ))
          else
            echo "Outside maintenance window (current minute: $minute). Proceeding."
          fi

      # Step 7: Deploy all files via SFTP
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: './httpdocs/*'
          remote_path: '/httpdocs'
          sftp_only: true
          delete_remote_files: false
